<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather-app3</title>
    <link rel="stylesheet" href="/src/style.css">
    <script type="module" src="/src/main.js"></script>
    <script src="/src/main.js" defer></script>
  </head>
  <body>
    <a href="#main" class="visually-hidden">Skip to main content</a>
    <header>
      <div class="header wrapper">
        <a href="/">
          <img src="/src/assets/icons/logo.svg" alt="Weather Now Home" width="197" height="40">
        </a>

        <select class="dropdown header__dropdown" name="units" id="ddlUnits">
          <option value="">Units</option>
          <option value="C">&deg;C</option>
          <option value="F">&deg;F</option>
        </select>
      </div>

    </header>
    <main id="main" class="main wrapper">
      <section class="hero">
        <div class="hero__content">
          <h1 class="hero__title">How's the sky looking today?</h1>

          <div class="hero__search">
            <input class="hero__textbox" type="text" name="search" id="txtSearch" placeholder="Search for a place...">
            <button id="btnSearch" class="hero__button" type="submit">Search</button>
          </div>
        </div>

      </section>

      <div class="dashboard">
        <section class="current">
          <h2 class="visually-hidden">Current Location Temperature</h2>

          <div class="current__weather">
            <div class="current__location">
              <div id="dvCityCountry" class="current__city">Johannesburg, South Africa</div>
              <div id="dvCurrDate" class="current__date">Thursday, April 16, 2026</div>
            </div>
            <div class="current__info">
              <img class="current__icon" src="/src/assets/icons/clear-day.svg" alt="" width="320" height="320">
              <div class="current__temp"><span id="dvCurrTemp">20</span>&deg;</div>
            </div>
          </div>

          <div class="current__conditions">
            <div class="block current__condition">
              <p class="current__conditon-title">Feels Like</p>
              <p class="current__condition-value"><span id="pFeelsLike"></span>&deg;</p>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
